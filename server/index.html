<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="discordwebp.css">
        <title>serverdiscord</title>
    </head>
<body>

<h2>เลือกห้อง</h2>
<select id="channel">
  <option value="1358176900807393371">ห้องของคุณ</option>
  <option value="1358185131902374022">kuy</option>
</select>


<div id="chat"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let lastData = "";

const socket = io();
socket.on("message", (data) => {
    const select = document.getElemenByID("channel");

    const option = document.createElement("option");
    option.text =data;
    option.value = data;

    select.appendChild(option);
});

// โหลดข้อมูล
async function load() {
  const id = document.getElementById("channel").value;

  const res = await fetch(`http://localhost:3000/messages/${id}`);
  const data = await res.json();

  // เช็คว่ามีข้อมูลใหม่ไหม
  const newData = JSON.stringify(data);
  if (newData === lastData) return; // ถ้าเหมือนเดิม ไม่ต้องอัปเดต

  lastData = newData;

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(msg => {
    const div = document.createElement("div");

    div.innerHTML = `<b>${msg.user}</b>: ${msg.text}`;

    msg.images.forEach(img => {
      const image = document.createElement("img");
      image.src = img;
      image.width = 200;
      div.appendChild(document.createElement("br"));
      div.appendChild(image);
    });
    msg.videos.forEach(vid => {
      const video = document.createElement("video");
      video.src = vid;
      video.width = 300;
      video.controls = true;

      div.appendChild(document.createElement("br"));
      div.appendChild(video);
});

    chat.appendChild(div);
    chat.appendChild(document.createElement("hr"));
  });

  // เลื่อนลงล่างสุด (เหมือน Discord)
  window.scrollTo(0, document.body.scrollHeight);
}

// 🔄 โหลดทุก 2 วินาที
setInterval(load, 2000);

// โหลดครั้งแรก
load();
</script>

</body>
</html>

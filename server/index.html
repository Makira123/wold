<!DOCTYPE html>
<html>
<head>
  <title>Discord Viewer</title>
</head>

<body>

<h2>เลือกห้อง</h2>

<select id="channel">
  <option value="1358176900807393371">ห้อง A</option>
  <option value="1358185131902374022">ห้อง B</option>
</select>

<button onclick="load()">โหลด</button>

<div id="chat"></div>

<script>
async function load() {
  const id = document.getElementById("channel").value;

  const res = await fetch(`/messages/${id}`);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(msg => {
    const div = document.createElement("div");

    div.innerHTML = `<b>${msg.user}</b>: ${msg.text || ""}`;

    // 🖼 images
    msg.images.forEach(img => {
      const image = document.createElement("img");
      image.src = img;
      image.width = 200;
      div.appendChild(document.createElement("br"));
      div.appendChild(image);
    });

    // 🎥 videos
    msg.videos.forEach(vid => {
      const video = document.createElement("video");
      video.src = vid;
      video.controls = true;
      video.width = 250;
      div.appendChild(document.createElement("br"));
      div.appendChild(video);
    });

    chat.appendChild(div);
    chat.appendChild(document.createElement("hr"));
  });
}

load();
setInterval(load, 3000);
</script>

</body>
</html>

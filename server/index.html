<!DOCTYPE html>
<html>
<head>
  <title>Discord Web</title>
</head>

<body>

<h2>เลือกห้อง</h2>

<select id="channel">
  <option value="1358176900807393371">ห้อง A</option>
  <option value="1358185131902374022">ห้อง B</option>
</select>

<div id="chat"></div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// 🔥 realtime
socket.on("message", (msg) => {
  renderMessage(msg);
});

// 📦 โหลดย้อนหลัง
async function load() {
  const id = document.getElementById("channel").value;

  const res = await fetch(`/messages/${id}`);
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(renderMessage);
}

function renderMessage(msg) {
  const chat = document.getElementById("chat");

  const box = document.createElement("div");
  box.style.border = "1px solid #ccc";
  box.style.margin = "5px";
  box.style.padding = "5px";

  // 👤 user
  box.innerHTML += `<b>${msg.user}</b><br>`;

  // 💬 text
  box.innerHTML += `${msg.text || ""}<br>`;

  // 🔗 links
  if (msg.links) {
    msg.links.forEach(link => {
      const a = document.createElement("a");
      a.href = link;
      a.target = "_blank";
      a.innerText = link;
      box.appendChild(document.createElement("br"));
      box.appendChild(a);
    });
  }

  // 🖼 images
  if (msg.images) {
    msg.images.forEach(img => {
      const image = document.createElement("img");
      image.src = img;
      image.width = 200;
      box.appendChild(document.createElement("br"));
      box.appendChild(image);
    });
  }

  // 🎥 videos
  if (msg.videos) {
    msg.videos.forEach(vid => {
      const video = document.createElement("video");
      video.src = vid;
      video.controls = true;
      video.width = 250;
      box.appendChild(document.createElement("br"));
      box.appendChild(video);
    });
  }

  chat.appendChild(box);
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
